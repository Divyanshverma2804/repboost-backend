<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weekly digest</title>
  </head>
  <body style="margin:0;padding:0;background:#f5f7ff;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f7ff;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:18px;overflow:hidden;box-shadow:0 12px 40px rgba(30,41,59,0.12);">
            <tr>
              <td style="padding:22px 22px;background:linear-gradient(90deg,#7c3aed,#2563eb);color:#ffffff;">
                <div style="font-size:18px;font-weight:800;letter-spacing:0.2px;">Rewple</div>
                <div style="font-size:12px;opacity:0.9;margin-top:6px;">Your Weekly Reputation Report</div>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 22px 12px 22px;">
                <div style="font-size:18px;font-weight:800;color:#0f172a;">{{businessName}} · Weekly Digest</div>
                <div style="font-size:14px;color:#475569;margin-top:8px;line-height:1.6;">
                  Here’s a quick snapshot of your week.
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:0 22px 16px 22px;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:separate;border-spacing:0 10px;">
                  <tr>
                    <td style="width:33%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px;">
                      <div style="font-size:12px;color:#64748b;font-weight:700;">Reviews</div>
                      <div style="font-size:20px;color:#0f172a;font-weight:900;margin-top:4px;">{{reviewsCollected}}</div>
                    </td>
                    <td style="width:4%"></td>
                    <td style="width:33%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px;">
                      <div style="font-size:12px;color:#64748b;font-weight:700;">Avg Rating</div>
                      <div style="font-size:20px;color:#0f172a;font-weight:900;margin-top:4px;">{{avgRating}}</div>
                    </td>
                    <td style="width:4%"></td>
                    <td style="width:33%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px;">
                      <div style="font-size:12px;color:#64748b;font-weight:700;">SMS Sent</div>
                      <div style="font-size:20px;color:#0f172a;font-weight:900;margin-top:4px;">{{smsSent}}</div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:0 22px 16px 22px;">
                <div style="font-size:14px;font-weight:800;color:#0f172a;margin-bottom:10px;">AI Insights</div>
                <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:14px;font-size:13px;color:#0f172a;line-height:1.6;">
                  {{aiInsights}}
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 22px 24px 22px;">
                <a href="{{link}}" style="display:inline-block;background:linear-gradient(90deg,#7c3aed,#2563eb);color:#ffffff;text-decoration:none;font-weight:800;font-size:14px;padding:12px 18px;border-radius:12px;">
                  View Full Dashboard
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 22px;background:#0b1220;color:#94a3b8;font-size:12px;">
                Powered by Rewple · © {{year}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

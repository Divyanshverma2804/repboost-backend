<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Rewple OTP Login</title>
  </head>
  <body style="margin:0;padding:0;background:#fdf2f8;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fdf2f8;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 12px 40px rgba(236,72,153,0.12);">
            <tr>
              <td style="padding:22px 22px;background:linear-gradient(90deg,#ec4899,#9333ea);color:#ffffff;">
                <div style="font-size:22px;font-weight:900;letter-spacing:0.5px;">Rewple</div>
                <div style="font-size:12px;opacity:0.9;margin-top:6px;font-weight:600;">The Gamified Review Experience</div>
              </td>
            </tr>
            <tr>
              <td style="padding:32px 32px 8px 32px;text-align:center;">
                <div style="font-size:26px;font-weight:900;color:#0f172a;">Your Login OTP 🔐</div>
                <div style="font-size:15px;color:#475569;margin-top:12px;line-height:1.6;font-weight:500;">
                  Use the following code to log into your Rewple account.
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;text-align:center;">
                <div style="display:inline-block;background:#f8fafc;color:#ec4899;font-size:42px;font-weight:900;padding:16px 32px;border-radius:20px;letter-spacing:8px;border:2px solid #f1f5f9;">
                  {{otp}}
                </div>
                <div style="font-size:12px;color:#64748b;margin-top:20px;line-height:1.5;font-weight:600;">
                  This code expires in {{expiresIn}}.
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 32px 32px 32px;text-align:center;">
                <div style="font-size:12px;color:#94a3b8;line-height:1.5;">
                  If you didn’t request this, please secure your account.
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 22px;background:#0f172a;color:#94a3b8;font-size:12px;font-weight:600;text-align:center;">
                Powered by Rewple · © {{year}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

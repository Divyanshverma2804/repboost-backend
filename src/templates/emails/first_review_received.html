<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>First review received</title>
  </head>
  <body style="margin:0;padding:0;background:#f5f7ff;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f7ff;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:18px;overflow:hidden;box-shadow:0 12px 40px rgba(30,41,59,0.12);">
            <tr>
              <td style="padding:22px 22px;background:linear-gradient(90deg,#7c3aed,#2563eb);color:#ffffff;">
                <div style="font-size:18px;font-weight:800;letter-spacing:0.2px;">Rewple</div>
                <div style="font-size:12px;opacity:0.9;margin-top:6px;">Milestone unlocked</div>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 22px 8px 22px;">
                <div style="font-size:20px;font-weight:800;color:#0f172a;">🎉 You got your first review!</div>
                <div style="font-size:14px;color:#475569;margin-top:10px;line-height:1.6;">
                  <strong>{{customerName}}</strong> left a rating of <strong>{{rating}}/5</strong> for <strong>{{businessName}}</strong>.
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:12px 22px;">
                <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:14px;font-size:14px;color:#0f172a;line-height:1.6;">
                  {{feedbackSnippet}}
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 22px;">
                <a href="{{link}}" style="display:inline-block;background:linear-gradient(90deg,#7c3aed,#2563eb);color:#ffffff;text-decoration:none;font-weight:800;font-size:14px;padding:12px 18px;border-radius:12px;">
                  View Review
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 22px 24px 22px;">
                <div style="font-size:12px;color:#94a3b8;line-height:1.5;">
                  Tip: replying quickly builds trust and improves conversions.
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 22px;background:#0b1220;color:#94a3b8;font-size:12px;">
                Powered by Rewple · © {{year}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
